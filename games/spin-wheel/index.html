<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌀</text></svg>" />
    <title>Spin Wheel — GoPlay</title>
  </head>
  <body class="game-shell" data-game="spin-wheel">
    <div id="stage">
      <header class="topbar">
        <button type="button" class="gp-close gp-close-corner" aria-label="Close" onclick="if(history.length>1){history.back()}else{location.href='../../'}">✕</button>
        <span class="game-name" data-i18n="sw.title">Spin Wheel</span>
      </header>

      <div id="spin-wheel-wrapper">
        <div id="freeHud"></div>

        <div class="sw-wheel-container">
          <div class="sw-arrow"></div>
          <div class="sw-3d-frame">
            <canvas id="sw-canvas" class="sw-canvas"></canvas>
          </div>
          <div class="sw-center-cap"></div>
        </div>
        <div class="sw-message" id="sw-message"></div>
        <div class="shell-run-reward" id="runReward"></div>
        <button class="sw-spin-btn" id="sw-spin-btn" style="user-select:none;-webkit-user-select:none;" data-i18n="sw.holdBtn">HOLD TO SPIN</button>
      </div>
    </div>

    <script type="module" src="/src/games/spin-wheel/main.ts"></script>
  </body>
</html>
