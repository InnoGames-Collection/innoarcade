<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📦</text></svg>" />
    <title>Lucky Boxes — GoPlay</title>
  </head>
  <body class="game-shell" data-game="lucky-box">
    <div id="stage">
      <header class="topbar">
        <button type="button" class="gp-close gp-close-corner" aria-label="Close" onclick="if(history.length>1){history.back()}else{location.href='../../'}">✕</button>
        <span class="game-name" data-i18n="lb.title">Lucky Boxes</span>
      </header>

      <div id="lucky-box-wrapper">
        <div id="freeHud"></div>

        <div class="lb-boxes-container" id="lb-boxes-container">
          <div class="lb-box" data-index="0"><div class="lb-box-inner">📦</div><div class="lb-box-label"><span data-i18n="lb.box">Box</span> 1</div></div>
          <div class="lb-box" data-index="1"><div class="lb-box-inner">📦</div><div class="lb-box-label"><span data-i18n="lb.box">Box</span> 2</div></div>
          <div class="lb-box" data-index="2"><div class="lb-box-inner">📦</div><div class="lb-box-label"><span data-i18n="lb.box">Box</span> 3</div></div>
        </div>
        <div class="lb-message" id="lb-message"></div>

        <div id="lb-gamble-container" class="lb-gamble-container">
          <div class="lb-message lb-gamble-title" id="lb-gamble-title" data-i18n="lb.doubleOrNothing">⚡ DOUBLE OR NOTHING ⚡</div>
          <div class="lb-boxes-container">
            <div class="lb-gamble-chest" data-gidx="0"><div class="lb-box-inner">🔮</div><div class="lb-box-label"><span data-i18n="lb.chest">Chest</span> A</div></div>
            <div class="lb-gamble-chest" data-gidx="1"><div class="lb-box-inner">🔮</div><div class="lb-box-label"><span data-i18n="lb.chest">Chest</span> B</div></div>
          </div>
          <div class="lb-gamble-actions">
            <button class="lb-reset-btn lb-cashout" id="lb-cashout-btn" data-i18n="lb.takeWin">TAKE WIN</button>
          </div>
        </div>

        <div class="shell-run-reward" id="runReward"></div>
        <button class="lb-reset-btn" id="lb-reset-btn" data-i18n="arc.playAgain">PLAY AGAIN</button>
      </div>
    </div>

    <script type="module" src="/src/games/lucky-box/main.ts"></script>
  </body>
</html>
