<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔢</text></svg>" />
    <title>2048 — GoPlay</title>
  </head>
  <body class="game-shell" data-game="merge-2048">
    <div id="stage" class="m2-stage game-shell-stage">
      <div id="m2Backdrop" class="m2-backdrop" aria-hidden="true"></div>

      <div id="menuOverlay" class="game-overlay">
        <div class="game-panel panel-clean">
          <button type="button" class="gp-close gp-close-corner" aria-label="Close" onclick="if(history.length>1){history.back()}else{location.href='../../'}">✕</button>
          <div class="shell-free-menu" id="freeMenu"></div>
          <button id="startBtn" class="btn primary" data-i18n="hub.play">Play</button>
        </div>
      </div>

      <div id="m2-play-wrapper" class="m2-play-wrapper hidden">
        <button id="closeBtn" type="button" class="gp-close gp-close-corner" aria-label="Close" onclick="if(history.length>1){history.back()}else{location.href='../../'}">✕</button>
        <header id="hud" class="m2-hud">
          <div class="m2-stats">
            <div class="m2-stat">
              <span class="m2-stat-label" data-i18n="m2.score">Score</span>
              <strong class="m2-stat-value" id="scoreVal">0</strong>
            </div>
            <div class="m2-stat m2-stat-best">
              <span class="m2-stat-label" data-i18n="m2.best">Best</span>
              <strong class="m2-stat-value" id="bestVal">0</strong>
            </div>
          </div>
          <div class="m2-controls">
            <button id="muteBtn" type="button" aria-label="Sound">🔊</button>
            <button id="pauseBtn" type="button" aria-label="Pause">⏸</button>
          </div>
        </header>
        <canvas id="game" width="480" height="480"></canvas>
      </div>

      <div id="pauseOverlay" class="game-overlay hidden">
        <div class="game-panel">
          <button type="button" class="gp-close gp-close-corner" aria-label="Close" onclick="if(history.length>1){history.back()}else{location.href='../../'}">✕</button>
          <h2 data-i18n="td.paused">Paused</h2>
          <button id="resumeBtn" class="btn primary" data-i18n="td.resume">Resume</button>
          <button id="restartBtn" class="btn" data-i18n="td.restart">Play again</button>
        </div>
      </div>

      <div id="overOverlay" class="game-overlay hidden">
        <div class="game-panel">
          <button type="button" class="gp-close gp-close-corner" aria-label="Close" onclick="if(history.length>1){history.back()}else{location.href='../../'}">✕</button>
          <h2 data-i18n="m2.gameOver">Game over</h2>
          <p id="newBest" class="new-best hidden" data-i18n="m2.newBest"></p>
          <div class="shell-over-final">
            <div class="shell-over-stat"><span data-i18n="m2.score">Score</span><strong id="finalScore">0</strong></div>
            <div class="shell-over-stat"><span data-i18n="m2.best">Best</span><strong id="finalBest">0</strong></div>
          </div>
          <div class="shell-run-reward" id="runReward"></div>
          <button id="againBtn" class="btn primary" data-i18n="m2.restart">Play again</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/games/merge-2048/main.ts"></script>
  </body>
</html>
