<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧩</text></svg>" />
    <title>Memory Match — GoPlay</title>
  </head>
  <body class="game-shell" data-game="memory-match">
    <div id="stage" class="mm-stage game-shell-stage">
      <div id="mmBackdrop" class="mm-backdrop" aria-hidden="true">
        <div class="mm-bg-gradient"></div>
        <div class="mm-bg-waves"></div>
        <div class="mm-bg-blob mm-bg-blob-a"></div>
        <div class="mm-bg-blob mm-bg-blob-b"></div>
        <div class="mm-bg-particles"></div>
      </div>

      <div id="menuOverlay" class="game-overlay mm-menu-overlay">
        <div class="game-panel mm-menu-panel panel-clean">
          <button type="button" class="gp-close gp-close-corner" aria-label="Close">✕</button>
          <div class="mm-menu-hero">
            <span class="mm-menu-icon" aria-hidden="true">🧩</span>
            <h1 class="mm-menu-title" data-i18n="mm.title">Memory Match</h1>
            <p class="mm-menu-sub" data-i18n="mm.tapPlay">Tap Play to start a 2-minute round!</p>
          </div>
          <div class="shell-tourney mm-tourney-card" id="mmTourney" aria-live="polite"></div>
          <details class="mm-howto">
            <summary data-i18n="td.howto">How to play</summary>
            <p data-i18n="mm.howtoHint">Flip cards to find matching pairs. Clear all 6 pairs before time runs out for the best score!</p>
          </details>
          <button type="button" id="mmStartBtn" class="mm-btn mm-btn-primary mm-btn-pulse" data-i18n="hub.play">Play</button>
        </div>
      </div>

      <div id="memory-match-wrapper" class="mm-playframe hidden">
        <button type="button" id="mmCloseBtn" class="gp-close gp-close-corner" aria-label="Close">✕</button>
        <button type="button" id="mmMuteBtn" class="mm-icon-btn mm-mute-btn" aria-label="Mute">🔊</button>

        <div class="mm-hud">
          <div class="mm-stats">
            <div class="mm-stat" id="mm-stat-time">
              <span class="mm-stat-icon" aria-hidden="true">⏱</span>
              <span class="mm-stat-label" data-i18n="mm.time">Time</span>
              <span class="mm-stat-value" id="mm-time">2:00</span>
            </div>
            <div class="mm-stat" id="mm-stat-moves">
              <span class="mm-stat-icon" aria-hidden="true">↔</span>
              <span class="mm-stat-label" data-i18n="mm.moves">Moves</span>
              <span class="mm-stat-value" id="mm-moves">0</span>
            </div>
            <div class="mm-stat" id="mm-stat-pairs">
              <span class="mm-stat-icon" aria-hidden="true">◎</span>
              <span class="mm-stat-label" data-i18n="mm.pairs">Pairs</span>
              <span class="mm-stat-value" id="mm-pairs">0/6</span>
            </div>
            <div class="mm-stat mm-stat-score" id="mm-stat-score">
              <span class="mm-stat-icon" aria-hidden="true">★</span>
              <span class="mm-stat-label" data-i18n="mm.score">Score</span>
              <span class="mm-stat-value" id="mm-score">—</span>
            </div>
          </div>
          <div class="mm-timer-bar" aria-hidden="true">
            <div class="mm-timer-fill" id="mm-timer-fill"></div>
          </div>
        </div>

        <div class="mm-grid" id="mm-grid"></div>

        <div class="mm-actions">
          <button type="button" class="mm-btn mm-btn-ghost hidden" id="mm-pause-btn" data-i18n="td.pause">Pause</button>
          <button type="button" class="mm-btn mm-btn-secondary hidden" id="mm-resume-btn" data-i18n="td.resume">Resume</button>
          <button type="button" class="mm-btn mm-btn-primary hidden" id="mm-restart-btn" data-i18n="td.restart">Play again</button>
        </div>
      </div>

      <div id="mmOverOverlay" class="game-overlay hidden" aria-hidden="true">
        <div class="game-panel mm-over-panel">
          <button type="button" class="gp-close gp-close-corner" aria-label="Close">✕</button>
          <h2 class="mm-over-title" id="mmOverTitle" data-i18n="td.gameOver">Game over</h2>
          <div class="mm-stars" id="mmStars" aria-hidden="true"></div>
          <p id="mmNewBest" class="mm-new-best hidden" data-i18n="td.newBest">New high score!</p>
          <div class="mm-over-stats">
            <div class="mm-over-stat mm-over-stat-main">
              <span data-i18n="td.score">Score</span>
              <strong id="mmFinalScore">0</strong>
            </div>
            <div class="mm-over-stat">
              <span data-i18n="td.best">Best</span>
              <strong id="mmFinalBest">0</strong>
            </div>
            <div class="mm-over-stat">
              <span data-i18n="mm.accuracy">Accuracy</span>
              <strong id="mmFinalAccuracy">—</strong>
            </div>
            <div class="mm-over-stat">
              <span data-i18n="mm.timeUsed">Time used</span>
              <strong id="mmFinalTime">—</strong>
            </div>
          </div>
          <div class="mm-run-reward" id="mmRunReward"></div>
          <div class="mm-over-board-wrap">
            <h3 data-i18n="td.leaderboard">Leaderboard</h3>
            <div class="mm-over-board" id="mmBoardOver"></div>
          </div>
          <div class="mm-over-actions">
            <button type="button" class="mm-btn mm-btn-primary" id="mmAgainBtn" data-i18n="td.restart">Play again</button>
            <button type="button" class="mm-btn mm-btn-secondary" id="mmHomeBtn" data-i18n="mm.home">Home</button>
          </div>
        </div>
      </div>

      <div id="toast" class="toast mm-toast hidden" role="status" aria-live="polite"></div>
    </div>

    <script type="module" src="/src/games/memory-match/main.ts"></script>
  </body>
</html>
