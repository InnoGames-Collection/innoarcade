<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💎</text></svg>" />
    <title>Jewel Match — GoPlay</title>
  </head>
  <body class="game-shell casual-shell brain-shell" data-game="jewel-match">
    <div id="stage" class="fc-stage game-shell-stage">
      <!-- Premium crystal background -->
      <div class="jm-bg-layer" aria-hidden="true">
        <div class="jm-bg-rays"></div>
        <div class="jm-bg-vignette"></div>
        <div class="jm-bg-sparkles" id="jmSparkles"></div>
        <div class="jm-bg-crystals" id="jmCrystals"></div>
      </div>

      <div id="fcBackdrop" class="fc-backdrop" aria-hidden="true"></div>

      <div id="fcPlayFrame" class="fc-playframe hidden">
        <button id="closeBtn" class="gp-close gp-close-corner hidden" aria-label="Close">✕</button>
        <div id="jewel-match-game-wrapper">
          <div class="jm-board-wrap">
            <div class="jm-board-frame">
              <div class="board" id="board"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Start screen -->
      <div id="menuOverlay" class="game-overlay">
        <div class="game-panel panel-clean jm-menu-panel">
          <button type="button" class="gp-close gp-close-corner" aria-label="Close">✕</button>
          <span class="jm-menu-icon" aria-hidden="true">💎</span>
          <h1 class="jm-menu-title">Jewel Match</h1>
          <div class="shell-free-menu" id="freeMenu"></div>
          <nav class="jm-menu-nav" aria-label="Game navigation">
            <a class="jm-menu-nav-btn" href="../../#featuredTournaments">🏆 Tournament</a>
            <a class="jm-menu-nav-btn" href="../../#topPlayers">📊 Leaderboard</a>
            <a class="jm-menu-nav-btn" href="../../">🎯 Daily Challenge</a>
            <a class="jm-menu-nav-btn" href="../../">🎁 Rewards</a>
          </nav>
          <button id="startBtn" class="btn primary jm-btn-primary" data-i18n="hub.play">Play</button>
        </div>
      </div>

      <!-- Game over / Victory screen -->
      <div id="overOverlay" class="game-overlay hidden" aria-hidden="true">
        <div class="game-panel jm-over-panel">
          <button type="button" class="gp-close gp-close-corner" aria-label="Close">✕</button>
          <div id="jmOverTrophy" class="jm-over-trophy hidden" aria-hidden="true">🏆</div>
          <h2 id="fcOverTitle" class="jm-over-title" data-i18n="td.gameOver">Game over</h2>
          <p id="fcOverSummary" class="fc-over-summary hidden"></p>
          <p id="newBest" class="new-best hidden" data-i18n="td.newBest"></p>
          <div class="jm-stars" id="jmStars" aria-label="Stars earned">
            <span class="jm-star" data-star="1">⭐</span>
            <span class="jm-star" data-star="2">⭐</span>
            <span class="jm-star" data-star="3">⭐</span>
          </div>
          <div class="jm-over-stats">
            <div class="jm-over-stat jm-over-stat--highlight">
              <span data-i18n="td.score">Score</span>
              <strong id="finalScore">0</strong>
            </div>
            <div class="jm-over-stat">
              <span data-i18n="td.best">Best</span>
              <strong id="finalBest">—</strong>
            </div>
            <div class="jm-over-stat">
              <span>Highest Combo</span>
              <strong id="jmFinalCombo">0</strong>
            </div>
            <div class="jm-over-stat">
              <span>Jewels Cleared</span>
              <strong id="jmFinalCleared">0</strong>
            </div>
          </div>
          <div class="shell-run-reward" id="runReward"></div>
          <div class="jm-over-actions">
            <button id="againBtn" class="btn primary jm-btn-primary" data-i18n="td.restart">Play again</button>
            <a class="jm-btn-secondary" href="../../#topPlayers" data-i18n="hub.leaderboard">Leaderboard</a>
            <button type="button" class="jm-btn-secondary" id="jmHomeBtn">Home</button>
          </div>
        </div>
      </div>
    </div>

    <div class="combo" id="combo" data-i18n="pb.combo">COMBO!</div>
    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>
    <script type="module" src="/src/games/jewel-match/main.ts"></script>
  </body>
</html>
