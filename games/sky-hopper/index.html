<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☁️</text></svg>" />
    <title>Sky Hopper — GoPlay</title>
  </head>
  <body class="game-shell arcade-shell" data-game="sky-hopper">
    <div id="stage" class="fc-stage arcade-stage game-shell-stage">
      <div id="fcBackdrop" class="fc-backdrop" aria-hidden="true"></div>

      <div id="menuOverlay" class="game-overlay">
        <div class="game-panel panel-clean sh-panel">
          <button type="button" class="gp-close gp-close-corner" aria-label="Close" onclick="if(history.length>1){history.back()}else{location.href='../../'}">✕</button>
          <div class="shell-free-menu" id="freeMenu"></div>
          <button id="startBtn" class="btn primary sh-btn" data-i18n="hub.play">Play</button>
        </div>
      </div>

      <div id="arc-play-wrapper" class="arc-play-wrapper hidden">
        <button id="closeBtn" type="button" class="gp-close gp-close-corner" aria-label="Close" onclick="if(history.length>1){history.back()}else{location.href='../../'}">✕</button>
        <header id="hud" class="arc-hud sh-hud">
          <div class="sh-hud-cards">
            <div class="sh-hud-card sh-hud-card--score">
              <span class="sh-hud-label" data-i18n="td.score">Score</span>
              <strong class="sh-hud-value" id="scoreVal">0</strong>
            </div>
            <div class="sh-hud-card sh-hud-card--height">
              <span class="sh-hud-label">Height</span>
              <strong class="sh-hud-value" id="heightVal">0</strong>
            </div>
            <div class="sh-hud-card sh-hud-card--best">
              <span class="sh-hud-label" data-i18n="td.best">Best</span>
              <strong class="sh-hud-value" id="bestVal">0</strong>
            </div>
          </div>
          <div class="arc-hud-actions sh-hud-actions">
            <button id="muteBtn" type="button" class="sh-icon-btn" aria-label="Sound">🔊</button>
            <button id="pauseBtn" type="button" class="sh-icon-btn" aria-label="Pause">⏸</button>
          </div>
        </header>
        <div class="arc-canvas-wrap sh-canvas-wrap">
          <canvas id="game" width="480" height="720"></canvas>
        </div>
      </div>

      <div id="pauseOverlay" class="game-overlay hidden">
        <div class="game-panel sh-panel">
          <button type="button" class="gp-close gp-close-corner" aria-label="Close" onclick="if(history.length>1){history.back()}else{location.href='../../'}">✕</button>
          <h2 data-i18n="td.paused">Paused</h2>
          <button id="resumeBtn" class="btn primary sh-btn" data-i18n="td.resume">Resume</button>
          <button id="restartBtn" class="btn sh-btn" data-i18n="td.restart">Play again</button>
        </div>
      </div>

      <div id="overOverlay" class="game-overlay hidden">
        <div class="game-panel sh-panel sh-over-panel">
          <button type="button" class="gp-close gp-close-corner" aria-label="Close" onclick="if(history.length>1){history.back()}else{location.href='../../'}">✕</button>
          <h2 data-i18n="td.gameOver">Game over</h2>
          <p id="newBest" class="new-best sh-new-best hidden" data-i18n="td.newBest"></p>
          <div class="sh-over-stats">
            <div class="sh-over-stat sh-over-stat--primary">
              <span data-i18n="td.score">Score</span>
              <strong id="finalScore">0</strong>
            </div>
            <div class="sh-over-stat">
              <span>Height</span>
              <strong id="finalHeight">0</strong>
            </div>
            <div class="sh-over-stat">
              <span>Longest Combo</span>
              <strong id="finalCombo">0</strong>
            </div>
            <div class="sh-over-stat">
              <span>Best</span>
              <strong id="finalBest">0</strong>
            </div>
          </div>
          <div class="shell-run-reward" id="runReward"></div>
          <div class="sh-over-actions">
            <button id="againBtn" class="btn primary sh-btn" data-i18n="td.restart">Play again</button>
            <button id="homeBtn" type="button" class="btn sh-btn sh-btn--ghost" onclick="if(history.length>1){history.back()}else{location.href='../../'}">Home</button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/games/sky-hopper/main.ts"></script>
  </body>
</html>
