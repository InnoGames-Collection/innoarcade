<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🇪🇹</text></svg>" />
    <title>Ethiopian Quiz — GoPlay</title>
  </head>
  <body class="game-shell" data-game="ethiopian-quiz">
    <div id="stage">
      <header class="topbar">
        <button type="button" class="gp-close gp-close-corner" aria-label="Close" onclick="if(history.length>1){history.back()}else{location.href='../../'}">✕</button>
        <span class="game-name">🇪🇹 <span id="eq-title">Ethiopian Quiz</span></span>
      </header>

      <div id="eq-wrapper">
        <div id="freeHud"></div>

        <div class="eq-card" id="eq-card">
          <div class="eq-progress" id="eq-progress"></div>
          <h2 class="eq-question" id="eq-question">…</h2>
          <div class="eq-options" id="eq-options"></div>
          <div class="eq-message" id="eq-message"></div>
          <div class="shell-run-reward" id="runReward"></div>
          <button class="eq-btn" id="eq-start">Start</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/games/ethiopian-quiz/main.ts"></script>
  </body>
</html>
